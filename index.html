<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI智能菜谱助手</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: "Microsoft YaHei", system-ui, -apple-system, sans-serif;
        }
        body {
            background: linear-gradient(145deg, #fff5f7, #ffe1e6);
            padding: 60px 16px;
            min-height: 100vh;
        }
        .wrap {
            max-width: 540px;
            margin: 0 auto;
            background: #ffffff;
            padding: 40px;
            border-radius: 26px;
            box-shadow: 0 10px 35px rgba(212, 38, 62, 0.14);
        }
        h1 {
            text-align: center;
            color: #d4263e;
            font-size: 28px;
            margin-bottom: 40px;
            letter-spacing: 1px;
        }
        .box {
            background: #fef1f3;
            border-radius: 20px;
            padding: 28px;
            margin-bottom: 32px;
        }
        .label {
            color: #d4263e;
            font-size: 18px;
            font-weight: 500;
            margin-bottom: 16px;
            display: block;
        }
        textarea {
            width: 100%;
            border: 1px solid #f2bdc4;
            border-radius: 14px;
            padding: 18px;
            font-size: 16px;
            min-height: 95px;
            background: #fff;
            resize: none;
            margin-bottom: 18px;
            transition: all 0.24s ease;
        }
        textarea:focus {
            outline: none;
            border-color: #d4263e;
            box-shadow: 0 0 0 3px rgba(212, 38, 62, 0.1);
        }
        button {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 14px;
            background: #d4263e;
            color: #fff;
            font-size: 17px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.24s ease;
            margin-bottom:16px;
        }
        button:hover:not(:disabled) {
            background: #b61f33;
            transform: translateY(-3px);
            box-shadow: 0 6px 16px rgba(212, 38, 62, 0.28);
        }
        button:active:not(:disabled) {
            transform: translateY(0);
        }
        button:disabled {
            background: #d6a3ab;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .img-box{
            width:100%;
            min-height:200px;
            background:#fff;
            border-radius:14px;
            display:flex;
            align-items:center;
            justify-content:center;
            color:#999;
            overflow:hidden;
            margin-bottom:18px;
        }
        .img-box img{
            width:100%;
            height:auto;
            display:block;
        }
    </style>
</head>
<body>
<div class="wrap">
    <h1>🔍 AI 智能菜谱助手</h1>
    <div class="box">
        <span class="label">✨输入菜名，AI生成菜谱+菜品实拍图</span>
        <textarea id="dishInput" placeholder="输入菜名，例如：红烧肉、辣椒炒肉"></textarea>
        <button id="btn1" onclick="getDish()">生成完整菜谱+菜品图片</button>
        <div class="img-box" id="imgBox1">暂无菜品图片</div>
        <textarea id="res1" readonly></textarea>
    </div>
    <div class="box">
        <span class="label">✨输入食材，AI自动搭配家常菜</span>
        <textarea id="matInput" placeholder="输入家里现有食材：鸡蛋、五花肉、土豆"></textarea>
        <button id="btn2" onclick="getMatch()">AI 智能搭配菜品</button>
        <textarea id="res2" readonly></textarea>
    </div>
</div>
<script>
const BASE_API = "https://wuyanzu-production-84fa.up.railway.app/api";
async function getDish() {
    const dishName = document.getElementById("dishInput").value.trim();
    if (!dishName) {
        alert("请输入菜名");
        return;
    }
    const btn = document.getElementById("btn1");
    const resText = document.getElementById("res1");
    const imgWrap = document.getElementById("imgBox1");
    btn.disabled = true;
    resText.value = "AI正在撰写菜谱，请稍候...";
    imgWrap.innerHTML = "正在生成菜品图片...";
    try {
        const recipeResp = await fetch(`${BASE_API}/getRecipe`, {
            method: "POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify({prompt:`你是专业家常菜厨师，详细讲解【${dishName}】完整做法，分四点输出：1菜品简介 2食材分量 3分步操作 4烹饪小贴士，语言简洁易懂。`})
        });
        const recipeData = await recipeResp.json();
        if (!recipeData.success) {
            resText.value = recipeData.msg;
            imgWrap.innerHTML = "图片生成失败";
            btn.disabled = false;
            return;
        }
        resText.value = recipeData.data;
        const imgResp = await fetch(`${BASE_API}/getImage`, {
            method: "POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify({prompt: dishName})
        });
        const imgData = await imgResp.json();
        if (imgData.success) {
            imgWrap.innerHTML = `<img src="${imgData.imgUrl}" alt="${dishName}菜品图">`;
        } else {
            imgWrap.innerHTML = "图片生成失败，菜谱已生成完成";
        }
    } catch (err) {
        resText.value = "网络请求失败，请稍后重试";
        imgWrap.innerHTML = "图片加载异常";
    }
    btn.disabled = false;
}
async function getMatch() {
    const foodList = document.getElementById("matInput").value.trim();
    if (!foodList) {
        alert("请输入你现有的食材");
        return;
    }
    const btn = document.getElementById("btn2");
    const resText = document.getElementById("res2");
    btn.disabled = true;
    resText.value = "AI正在搭配家常菜，请稍候...";
    try {
        const resp = await fetch(`${BASE_API}/getRecipe`, {
            method: "POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify({prompt:`现有食材：${foodList}，推荐3道简单家常菜，附带完整详细做法。`})
        });
        const data = await resp.json();
        if (data.success) {
            resText.value = data.data;
        } else {
            resText.value = data.msg;
        }
    } catch (err) {
        resText.value = "网络请求失败，请稍后重试";
    }
    btn.disabled = false;
}
</script>
</body>
</html>
