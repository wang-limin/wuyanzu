<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 智能菜谱助手</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }
        body{
            background: linear-gradient(135deg,#fff5f8,#fef2f4);
            padding: 30px 15px;
        }
        .wrap{
            max-width: 600px;
            margin: 0 auto;
            background: #fff;
            border-radius: 20px;
            padding: 35px;
            box-shadow: 0 10px 30px rgba(220, 80, 100, 0.12);
        }
        h1{
            text-align: center;
            color: #e63950;
            font-size: 26px;
            margin-bottom: 30px;
        }
        .card{
            background: #fef4f6;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
        }
        h3{
            color: #c92a40;
            margin-bottom: 14px;
            font-size: 17px;
        }
        textarea{
            width: 100%;
            border: 1px solid #f8c8d0;
            border-radius: 10px;
            padding: 14px;
            font-size: 15px;
            min-height: 80px;
            resize: none;
            outline: none;
            margin-bottom: 14px;
        }
        textarea:focus{
            border-color: #e63950;
        }
        button{
            width: 100%;
            border: none;
            padding: 13px;
            border-radius: 10px;
            background: linear-gradient(135deg,#e63950,#d6283e);
            color: #fff;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
        }
        button:disabled{
            background: #ccc;
            cursor: not-allowed;
        }
        .loading{
            text-align: center;
            color: #999;
            margin: 12px 0;
            display: none;
        }
        .result{
            background: #fff;
            border-left: 4px solid #e63950;
            padding: 18px;
            border-radius: 10px;
            line-height: 1.9;
            color: #333;
            white-space: pre-line;
        }
    </style>
</head>
<body>
    <div class="wrap">
        <h1>🍳 AI 智能菜谱助手</h1>

        <!-- 1.输入菜名做菜 -->
        <div class="card">
            <h3>✨ 输入菜名，AI 教你做菜</h3>
            <textarea id="nameInp" placeholder="输入菜名：如红烧肉、可乐鸡翅、番茄炒蛋"></textarea>
            <button onclick="cookByName()">生成完整菜谱</button>
            <div class="loading" id="load1">AI 正在生成菜谱...</div>
            <div class="result" id="res1"></div>
        </div>

        <!-- 2.输入剩菜搭配 -->
        <div class="card">
            <h3>✨ 输入剩食材，AI 帮你搭配</h3>
            <textarea id="matInp" placeholder="输入家里现有食材：鸡蛋、西红柿、土豆、豆腐"></textarea>
            <button onclick="cookByMat()">AI 智能搭配菜品</button>
            <div class="loading" id="load2">AI 正在搭配菜谱...</div>
            <div class="result" id="res2"></div>
        </div>

    </div>

    <script>
        const api = "https://api.vvhan.com/api/ai/chat?msg=";

        // 菜名生成菜谱
        async function cookByName(){
            let val = nameInp.value.trim();
            if(!val) return alert("请输入菜名！");
            load1.style.display = "block";
            res1.innerText = "";
            event.target.disabled = true;

            let q = `你是专业厨师，教新手做【${val}】。输出格式：【菜品简介】【食材清单】【详细步骤】【烹饪小贴士】，步骤详细、简单易懂。`;
            let d = await (await fetch(api + encodeURIComponent(q))).json();
            res1.innerText = d.data || "生成失败，请重试";

            load1.style.display = "none";
            event.target.disabled = false;
        }

        // 食材搭配菜谱
        async function cookByMat(){
            let val = matInp.value.trim();
            if(!val) return alert("请输入你有的食材！");
            load2.style.display = "block";
            res2.innerText = "";
            event.target.disabled = true;

            let q = `我家里只有这些食材：${val}。不用其他额外食材，帮我搭配2-3道简单家常菜，每道都写清楚食材用量和详细步骤，适合新手。`;
            let d = await (await fetch(api + encodeURIComponent(q))).json();
            res2.innerText = d.data || "生成失败，请重试";

            load2.style.display = "none";
            event.target.disabled = false;
        }
    </script>
</body>
</html>
