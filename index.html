<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>西红柿炒鸡蛋做法</title>
    <style>
        body {
            background: #fff8f0;
            font-family: "微软雅黑";
            max-width: 600px;
            margin: 40px auto;
            padding: 0 20px;
        }
        h1 {
            color: #e63946;
            text-align: center;
        }
        h2 {
            color: #333;
            font-size: 18px;
            margin-top: 30px;
        }
        ul, ol {
            line-height: 2;
            font-size: 16px;
            color: #444;
        }
        .box {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 0 8px #ffd6c0;
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>西红柿炒鸡蛋家常做法</h1>

        <h2>一、准备食材</h2>
        <ul>
            <li>西红柿 2个</li>
            <li>鸡蛋 3个</li>
            <li>小葱、盐、白糖、食用油少许</li>
        </ul>

        <h2>二、制作步骤</h2>
        <ol>
            <li>西红柿洗净切块，小葱切葱花；鸡蛋打入碗中加少许盐搅匀。</li>
            <li>锅中倒油烧热，倒入蛋液，定型后炒散盛出备用。</li>
            <li>同一口锅再加少量油，放入西红柿翻炒，按压出汤汁。</li>
            <li>加一小勺白糖中和酸味，适量盐调味。</li>
            <li>倒入炒好的鸡蛋，翻炒均匀，撒葱花即可出锅。</li>
        </ol>
    </div>
</body>
</html>
</body>
</html>
