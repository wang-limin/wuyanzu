<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>AI智能菜谱助手</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: system-ui;
        }
        body {
            background-color: #ffeef0;
            padding: 40px 20px;
        }
        .container {
            max-width: 480px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 16px;
        }
        h1 {
            text-align: center;
            color: #d62840;
            margin-bottom: 30px;
            font-size: 24px;
        }
        .card {
            background: #fef2f4;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 24px;
        }
        .title-tip {
            color: #d62840;
            font-size: 16px;
            margin-bottom: 12px;
        }
        textarea {
            width: 100%;
            padding: 14px;
            border: 1px solid #f8c8d0;
            border-radius: 8px;
            font-size: 15px;
            min-height: 80px;
            margin-bottom: 14px;
            background: #fff;
            resize: none;
        }
        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            background-color: #d62840;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }
        button:disabled {
            background: #bbb;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🔍 AI 智能菜谱助手</h1>

    <div class="card">
        <div class="title-tip">✨输入菜名，AI教你做菜</div>
        <!-- 修复textarea清空写法，中间无任何文字 -->
        <textarea id="dishInput" placeholder="输入菜名，例如：辣椒炒肉"></textarea>
        <button id="btn1" onclick="getDish()">生成完整菜谱</button>
        <textarea id="res1" readonly></textarea>
    </div>

    <div class="card">
        <div class="title-tip">✨输入剩食材，AI帮你搭配</div>
        <textarea id="matInput" placeholder="输入家里现有食材：鸡蛋、西红柿、土豆、豆腐"></textarea>
        <button id="btn2" onclick="getMatch()">AI 智能搭配菜品</button>
        <textarea id="res2" readonly></textarea>
    </div>
</div>

<script>
const BACKEND_URL = "https://wuyanzu-production-84fa.up.railway.app/api/getRecipe";

async function getDish() {
    const name = document.getElementById("dishInput").value.trim();
    if (!name) {
        alert("请输入菜名");
        return;
    }
    const btn = document.getElementById("btn1");
    const out = document.getElementById("res1");
    btn.disabled = true;
    out.value = "AI 正在生成菜谱...";
    try {
        const res = await fetch(BACKEND_URL, {
            method: "POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify({prompt:`你是资深家常菜厨师，给我详细讲解【${name}】完整做法，严格分4块：1菜品简介 2精准食材用量 3分步操作 4烹饪小贴士，语言简单易懂。`})
        });
        const data = await res.json();
        if(data.success){
            out.value = data.data;
        }else{
            out.value = "生成失败：" + (data.msg || "未知错误");
        }
    }catch(e){
        out.value = "无法连接后端，请检查Railway服务是否启动";
    }
    btn.disabled = false;
}

async function getMatch() {
    const mat = document.getElementById("matInput").value.trim();
    if (!mat) {
        alert("请输入食材");
        return;
    }
    const btn = document.getElementById("btn2");
    const out = document.getElementById("res2");
    btn.disabled = true;
    out.value = "AI 正在搭配菜品...";
    try {
        const res = await fetch(BACKEND_URL, {
            method: "POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify({prompt:`现有食材：${mat}，根据这些食材推荐3道家常菜，包含详细做法。`})
        });
        const data = await res.json();
        if(data.success){
            out.value = data.data;
        }else{
            out.value = "生成失败：" + (data.msg || "未知错误");
        }
    }catch(e){
        out.value = "无法连接后端，请检查Railway服务是否启动";
    }
    btn.disabled = false;
}
</script>
</body>
</html>
